name: Build Blutter Binary

on:
  workflow_dispatch:
    inputs:
      dart_version:
        description: 'Dart version (e.g. 3.3.4, 3.4.2)'
        required: true

permissions:
  contents: write

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pyelftools python3-requests \
            cmake ninja-build build-essential pkg-config \
            libicu-dev libcapstone-dev git curl unzip

      - name: Cache Dart SDK checkout
        uses: actions/cache@v4
        with:
          path: dartsdk/
          key: dart-linux-${{ inputs.dart_version }}
          restore-keys: dart-linux-${{ inputs.dart_version }}_

      - name: Cache compiled Dart VM static library
        uses: actions/cache@v4
        with:
          path: packages/
          key: dart-linux-pkg-${{ inputs.dart_version }}-android-arm64

      - name: Build blutter (Linux)
        run: |
          python blutter.py --rebuild --dart-version ${{ inputs.dart_version }}_android_arm64 build/out --no-analysis

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: bin/blutter_dartvm${{ inputs.dart_version }}_android_arm64

  build-windows:
    name: Build (Windows cross)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW cross-compiler
        run: |
          sudo apt update
          sudo apt install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 \
            cmake ninja-build python3 python3-pip curl unzip

      - name: Build Windows binary (MinGW cross)
        run: |
          chmod +x scripts/build_mingw64.sh
          bash scripts/build_mingw64.sh ${{ inputs.dart_version }}

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: bin/blutter_dartvm${{ inputs.dart_version }}_android_arm64.exe

  release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: linux
          path: release/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: release/

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.dart_version }}
          name: blutter ${{ inputs.dart_version }}
          files: release/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
