name: Build Blutter Binary

on:
  workflow_dispatch:
    inputs:
      dart_version:
        description: 'Dart version (e.g. 3.3.4, 3.4.2, 3.5.2)'
        required: true
      arch_x86_64:
        description: 'Build for x86_64 (Linux native)'
        required: false
        type: boolean
        default: false
      arch_aarch64:
        description: 'Build for aarch64 (Android ARM64, cross-compile)'
        required: false
        type: boolean
        default: true
  push:
    branches: [ master ]
    paths: [ '.github/workflows/build-blutter.yml', 'blutter/**', 'scripts/**' ]

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 5G
      CCACHE_COMPILERCHECK: "none"
      CCACHE_NOHASHDIR: "true"
      CCACHE_NOHARDLINK: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set build parameters
        run: |
          echo "DART_VERSION=${{ inputs.dart_version || '3.3.4' }}" >> $GITHUB_ENV
          if [ "${{ inputs.arch_aarch64 || 'true' }}" = "true" ]; then
            echo "ARCH=aarch64" >> $GITHUB_ENV
          else
            echo "ARCH=x86_64" >> $GITHUB_ENV
          fi

      - name: Restore Dart SDK cache
        id: cache-dartsdk
        uses: actions/cache@v4
        with:
          path: dartsdk/
          key: dartsdk-${{ env.DART_VERSION }}
          restore-keys: dartsdk-${{ env.DART_VERSION }}_

      - name: Restore CCache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ env.DART_VERSION }}-${{ env.ARCH }}
          restore-keys: ccache-${{ env.DART_VERSION }}-

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build git curl unzip \
            python3 python3-pip python3-pyelftools python3-requests \
            libcapstone-dev ccache \
            clang

      - name: Initialize CCache
        run: |
          mkdir -p "${{ env.CCACHE_DIR }}"
          ccache -M ${{ env.CCACHE_MAXSIZE }}
          ccache -s

      - name: Build blutter
        run: |
          echo "Building blutter ${{ env.DART_VERSION }} for ${{ env.ARCH }}..."
          python3 scripts/build.py "${{ env.DART_VERSION }}" --arch "${{ env.ARCH }}"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: blutter-${{ env.DART_VERSION }}-${{ env.ARCH }}
          path: bin/blutter_dartvm${{ env.DART_VERSION }}_android_arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DART_VERSION }}
          name: blutter ${{ env.DART_VERSION }} (${{ env.ARCH }})
          files: bin/blutter_dartvm${{ env.DART_VERSION }}_android_arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
