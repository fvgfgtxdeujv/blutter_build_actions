name: Build Blutter Binary

on:
  workflow_dispatch:
    inputs:
      dart_version:
        description: 'Dart version (e.g. 3.3.4, 3.4.2)'
        required: true
        default: '3.3.4'

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pyelftools python3-requests \
            cmake ninja-build build-essential pkg-config \
            libicu-dev libcapstone-dev git

      - name: Cache Dart SDK checkout
        uses: actions/cache@v4
        with:
          path: dartsdk/
          key: dart-linux-${{ inputs.dart_version }}
          restore-keys: dart-linux-${{ inputs.dart_version }}_

      - name: Cache compiled Dart VM static library
        uses: actions/cache@v4
        with:
          path: packages/
          key: dart-linux-pkg-${{ inputs.dart_version }}-android-arm64

      - name: Build blutter (Linux)
        run: |
          python blutter.py --rebuild --dart-version ${{ inputs.dart_version }}_android_arm64 build/out --no-analysis

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: blutter_${{ inputs.dart_version }}_linux
          path: bin/blutter_dartvm${{ inputs.dart_version }}_android_arm64
          retention-days: 90

  build-windows:
    name: Build (Windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC environment
        uses: microsoft/setup-msbuild@v2

      - name: Install dependencies
        run: |
          choco install -y cmake ninja python git
          pip install pyelftools requests

      - name: Cache Dart SDK checkout
        uses: actions/cache@v4
        with:
          path: dartsdk/
          key: dart-win-${{ inputs.dart_version }}
          restore-keys: dart-win-${{ inputs.dart_version }}_

      - name: Cache compiled Dart VM static library
        uses: actions/cache@v4
        with:
          path: packages/
          key: dart-win-pkg-${{ inputs.dart_version }}-android-arm64

      - name: Build blutter (Windows)
        run: |
          python blutter.py --rebuild --dart-version ${{ inputs.dart_version }}_android_arm64 build\out --no-analysis

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: blutter_${{ inputs.dart_version }}_windows
          path: bin/blutter_dartvm${{ inputs.dart_version }}_android_arm64.exe
          retention-days: 90
